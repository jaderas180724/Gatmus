<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Toolbox - Gemini in Firebase</title>
    <style>
        :root {
            --bg-color: #0a0e17;
            --card-bg-color: #1a1e27;
            --accent-color: #00ff88; /* Green neon for accents */
            --text-color: #e0e0e0;
            --border-color: #333;
            --input-bg-color: #2a2e37;
            --input-border-color: #555;
            --button-bg-color: #00b366;
            --button-hover-bg-color: #00e673;
            --shadow-color: rgba(0, 255, 136, 0.2);
            --log-bg-color: #12151e;
            --log-text-color: #00cc66;
            --scrollbar-thumb: #00ff88;
            --scrollbar-track: #2a2e37;
        }

        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--accent-color);
            margin-top: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            text-shadow: 0 0 10px var(--accent-color);
            margin-bottom: 10px;
        }

        .search-bar {
            margin-bottom: 20px;
            text-align: center;
        }

        .search-bar input {
            width: 90%;
            max-width: 500px;
            padding: 10px 15px;
            border: 1px solid var(--input-border-color);
            border-radius: 5px;
            background-color: var(--input-bg-color);
            color: var(--text-color);
            font-size: 1em;
            box-shadow: 0 0 5px rgba(0, 255, 136, 0.3);
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-button {
            background-color: var(--card-bg-color);
            color: var(--text-color);
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            margin: 0 5px 10px;
            border-radius: 5px 5px 0 0;
        }

        .tab-button.active {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .tab-button:hover:not(.active) {
            background-color: var(--input-bg-color);
            color: var(--accent-color);
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 0 15px var(--shadow-color);
            padding: 20px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .tool-card.hidden {
            display: none;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--accent-color);
        }

        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .tool-header h3 {
            margin: 0;
            color: var(--accent-color);
            font-size: 1.2em;
        }

        .tool-toggle-icon {
            font-size: 1.5em;
            color: var(--accent-color);
        }

        .tool-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .tool-card.expanded .tool-content {
            max-height: 1000px; /* Adjust as needed */
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea,
        select {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--input-border-color);
            border-radius: 4px;
            background-color: var(--input-bg-color);
            color: var(--text-color);
            font-size: 0.9em;
            box-shadow: inset 0 0 3px rgba(0, 0, 0, 0.5);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background-color: var(--button-bg-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: var(--button-hover-bg-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .output-area {
            background-color: var(--input-bg-color);
            border: 1px solid var(--input-border-color);
            border-radius: 4px;
            padding: 15px;
            margin-top: 15px;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--log-text-color);
            font-size: 0.9em;
            max-height: 300px;
            overflow-y: auto;
        }

        .output-area table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .output-area th, .output-area td {
            border: 1px solid var(--input-border-color);
            padding: 8px;
            text-align: left;
        }

        .output-area th {
            background-color: var(--border-color);
            color: var(--accent-color);
        }

        .checkbox-group, .radio-group {
            margin-bottom: 15px;
        }

        .checkbox-group label, .radio-group label {
            display: inline-flex;
            align-items: center;
            margin-right: 15px;
            margin-bottom: 5px;
        }

        .checkbox-group input[type="checkbox"],
        .radio-group input[type="radio"] {
            margin-right: 5px;
            width: auto;
            vertical-align: middle;
        }

        .qr-code-output img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-top: 10px;
            border: 1px solid var(--accent-color);
            background-color: white;
            padding: 5px;
        }

        .log-container {
            background-color: var(--log-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-top: 30px;
            box-shadow: 0 0 15px var(--shadow-color);
            flex-grow: 1; /* Allow log to expand */
        }

        #activity-log {
            height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.85em;
            color: var(--log-text-color);
            background-color: transparent;
            border: none;
            padding: 0;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 0.9em;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
            border: 2px solid var(--scrollbar-track);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--button-hover-bg-color);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .tool-grid {
                grid-template-columns: 1fr;
            }
            .tab-button {
                flex-grow: 1;
                margin: 0 2px 5px;
            }
        }
    </style>
</head>
